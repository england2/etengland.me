baseurl: "https://www.etengland.me/"
languageCode: "en-us"
title: "Elan England"
theme: "hugo-xmin"
googleAnalytics: ""
disqusShortname: ""
ignoreFiles: ["\\.Rmd$", "\\.Rmarkdown$", "_cache$"]
footnotereturnlinkcontents: "↩"

caches:
  images:
    dir: :cacheDir/images

permalinks:
  note: "/note/:year/:month/:day/:slug/"
  post: "/:slug/"

menu:
  main:
    - name: Home
      url: ""
      weight: 1
    # - name: All Work
    #   url: "work"

params:
  description: "Portfolio website."
  footer: "[Elan England](https://etengland.me) | [Github](https://github.com/england2) | [Contact](mailto://<firstnamelastname>@protonmail.com) "

markup:
  highlight:
    codeFences: true
    style: nord
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
          - - \[
            - \]
          - - $$
            - $$
          inline:
          - - \(
            - \)
