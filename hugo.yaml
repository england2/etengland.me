baseurl: "https://www.et-england.xyz/"
languageCode: "en-us"
title: "Elan England"
theme: "hugo-xmin"
googleAnalytics: ""
disqusShortname: ""
ignoreFiles: ["\\.Rmd$", "\\.Rmarkdown$", "_cache$"]
footnotereturnlinkcontents: "↩"

caches:
  images:
    dir: :cacheDir/images

permalinks:
  note: "/note/:year/:month/:day/:slug/"
  post: "/:slug/"

menu:
  main:
    - name: Home
      url: ""
      weight: 1
    - name: All Work
      url: "work"

params:
  description: "A website built through Hugo and blogdown."
  footer: "&copy; [Elan England](https://site) 2024 -- {Year} | [Github](https://github.com/england02) | [BlueSky](https://bsky.app/profile/test.com) | [X](https://test.com) | [SubStack](https://test.com)"

markup:
  highlight:
    codeFences: true
    style:  rose-pine
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
          - - \[
            - \]
          - - $$
            - $$
          inline:
          - - \(
            - \)
